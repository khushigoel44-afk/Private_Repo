name: My_Portfolio

on: 
    push:
        branches: [main]
    workflow_dispatch: 

permissions:
    contents: read
    pages: write
    id-token: write

jobs: 
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github_portfolio
            url: ${{ steps.deployment.outputs.pages_url }}
            
        steps:
            # Get access to the portfolio code via build-in github actions.
            - name: checkout code
              uses: actions/checkout@v4

            # setup github pages/
            - name: setup github pages
              uses: actions/configure-pages@v4

            # Make static files
            - name: upload static files
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "."

             # Make page live
            - name: deploy the code
              uses: actions/deploy-pages@v4
