name: Self-Hosted-Runner

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    validate:
        env:
            DOCKER_USERNAME: ${{var.USERNAME_VALUE}}
        runs-on: self-hosted
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose up -d --build
